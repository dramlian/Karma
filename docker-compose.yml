services:
  mysql:
    image: mysql:8.4
    container_name: chatapp-mysql
    environment:
      MYSQL_ROOT_PASSWORD: chatpass
      MYSQL_DATABASE: chatapp
    ports:
      - "3306:3306"
    volumes:
      - chat-mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  chat-mysql-data:
